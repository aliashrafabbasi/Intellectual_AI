services:
  mongo:
    image: mongo:7
    # No host port: avoids clashing with a local/other Mongo on 27017. API uses mongodb://mongo:27017.
    volumes:
      - intellectual_mongo_data:/data/db

  api:
    build: .
    command: uvicorn main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      MONGO_URI: mongodb://mongo:27017
    depends_on:
      - mongo

  streamlit:
    build: .
    command:
      - streamlit
      - run
      - streamlit_app.py
      - --server.address
      - "0.0.0.0"
      - --server.port
      - "8501"
    ports:
      - "8501:8501"
    env_file: .env
    environment:
      INTELLECTUAL_API_URL: http://api:8000
    depends_on:
      - api

volumes:
  intellectual_mongo_data:
